name: Rebuild tracker.csv

on:
  push:
    paths:
      - "data/stocks/**.json"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild CSV
        run: python3 scripts/build_tracker_csv.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tracker.csv
          git diff --staged --quiet || git commit -m "Auto-rebuild tracker.csv [skip ci]"
          git push
